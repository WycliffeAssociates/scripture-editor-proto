name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  set-secrets:
    # Central job to load all secrets from 1Password
    runs-on: ubuntu-latest
    outputs:
      apple_certificate: ${{ steps.secrets.outputs.APPLE_CERTIFICATE }}
      apple_certificate_password: ${{ steps.secrets.outputs.APPLE_CERTIFICATE_PASSWORD }}
      apple_api_issuer: ${{ steps.secrets.outputs.APPLE_API_ISSUER }}
      apple_api_key: ${{ steps.secrets.outputs.APPLE_API_KEY }}
      apple_api_key_path: ${{ steps.secrets.outputs.APPLE_API_KEY_PATH }}
      android_keystore_base64: ${{ steps.secrets.outputs.ANDROID_KEYSTORE }}
      android_keystore_password: ${{ steps.secrets.outputs.ANDROID_KEYSTORE_PASSWORD }}
      android_key_alias: ${{ steps.secrets.outputs.ANDROID_KEY_ALIAS }}
      android_key_password: ${{ steps.secrets.outputs.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Load Secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APPLE_CERTIFICATE: "op://DevOps/MYVAULT/APPLE_CERTIFICATE"
          APPLE_CERTIFICATE_PASSWORD: "op://DevOps/MYVAULT/APPLE_CERTIFICATE_PASSWORD"
          APPLE_API_ISSUER: "op://DevOps/MYVAULT/APPLE_API_ISSUER"
          APPLE_API_KEY: "op://DevOps/MYVAULT/APPLE_API_KEY"
          APPLE_API_KEY_PATH: "op://DevOps/MYVAULT/APPLE_API_KEY_PATH"
          ANDROID_KEYSTORE: "op://DevOps/MYVAULT/ANDROID_KEYSTORE"
          ANDROID_KEYSTORE_PASSWORD: "op://DevOps/MYVAULT/ANDROID_KEYSTORE_PASSWORD"
          ANDROID_KEY_ALIAS: "op://DevOps/MYVAULT/ANDROID_KEY_ALIAS"
          ANDROID_KEY_PASSWORD: "op://DevOps/MYVAULT/ANDROID_KEY_PASSWORD"
  # maybe put a job here to lint and make sure no errors?
  build-desktops:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 and x64
          - os: macos-latest
            args: "--target universal-apple-darwin"

          # Windows
          - os: windows-latest
            args: ""

          # Linux desktop
          - os: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.1
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src/tauri/rust -> target"

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: build tauri dist
        run: pnpm build.tauri

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Build + Release
        uses: tauri-apps/tauri-action@0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: true
          # doesn't run prebuild script: Expect assets already built at dist
          args: ${{ matrix.args }} --config ./src/tauri/rust/tauri.conf.ci_cache.json
      - name: Upload desktop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            src/tauri/rust/target/**/release/*

  build-android:
    runs-on: ubuntu-22.04
    needs: [build-desktops] # waits for desktop builds to finish
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Linux deps for tauri
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools build-tools;34.0.0"
      - name: Install SDK / Build-tools / NDK and verify apksigner
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"
          # Add build-tools to PATH to ensure apksigner is available
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH
          # Verify apksigner is available
          which apksigner || echo "apksigner not found in PATH"
          apksigner --version || echo "apksigner not executable"

      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV

      - name: build android apk and aab
        run: pnpm tauri android build --ci --config ./src/tauri/rust/tauri.conf.ci_cache.json

      - name: List Android build outputs
        shell: bash
        run: |
          echo "Checking Android build outputs:"
          ls -la ./src/tauri/rust/gen/android/app/build/outputs/apk/universal/release/ || echo "APK directory not found"
          ls -la ./src/tauri/rust/gen/android/app/build/outputs/bundle/universalRelease/ || echo "AAB directory not found"

      - name: Rename Android files
        shell: bash
        run: |
          # Get version from package.json
          VERSION=$(node -p "require('./package.json').version")

          # Rename APK file
          if [ -f "./src/tauri/rust/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk" ]; then
            mv "./src/tauri/rust/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk" \
               "./src/tauri/rust/gen/android/app/build/outputs/apk/universal/release/refiner-v${VERSION}-universal.apk"
            echo "Renamed APK to: refiner-v${VERSION}-universal.apk"
          fi

          # Rename AAB file
          if [ -f "./src/tauri/rust/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab" ]; then
            mv "./src/tauri/rust/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab" \
               "./src/tauri/rust/gen/android/app/build/outputs/bundle/universalRelease/refiner-v${VERSION}-universal.aab"
            echo "Renamed AAB to: refiner-v${VERSION}-universal.aab"
          fi

          # List renamed files
          echo "Final Android build outputs:"
          ls -la ./src/tauri/rust/gen/android/app/build/outputs/apk/universal/release/
          ls -la ./src/tauri/rust/gen/android/app/build/outputs/bundle/universalRelease/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            ./src/tauri/rust/gen/android/app/build/outputs/apk/universal/release/*.apk
            ./src/tauri/rust/gen/android/app/build/outputs/bundle/universalRelease/*.aab
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # real apple phones arch: won't work on simulator
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src/tauri/rust -> target"

      - name: Install dependencies
        run: pnpm install

      - name: build ios debug bundle
        run: pnpm tauri ios build --export-method debugging --ci --config ./src/tauri/rust/tauri.conf.ci_cache.json

    # todo: a job for android and stub for ios: cache the dist merge in config though
# https://github.com/tauri-apps/tauri-action?tab=readme-ov-file#tips-and-caveats
# If you need to further customize the default tauri.conf.json file you can add a custom config that will be merged with the default one at build time.
# args: --config custom-config.json, so we can merge in matrix args with conf ci_cahce and just pnpm I and build once and set as the cached output as well
# then use Joe's android logic and stub out ios?
# in order; get web: port android. ios stubbed
