name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64
          - os: macos-latest
            args: '--target aarch64-apple-darwin'
            mobile: false

          # macOS x64
          - os: macos-latest
            args: '--target x86_64-apple-darwin'
            mobile: false

          # Windows
          - os: windows-latest
            args: ''
            mobile: false

          # Linux desktop
          - os: ubuntu-22.04
            args: ''
            mobile: false

          # Android build
          - os: ubuntu-22.04
            args: ''
            mobile: android

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf


      - name: Install dependencies
        run: pnpm install

      - name: Initialize Android project if missing
        if: matrix.os == 'ubuntu-22.04'
        run: |
          if [ ! -d src/tauri/rust/gen/android ]; then
            pnpm tauri android init
          fi
          
          # The tauri-action implicitly sets up the NDK, we just need to find the bin directory.
          # We assume ANDROID_SDK_ROOT is set by the setup-android action.
          
          if [ -z "$ANDROID_NDK_ROOT" ]; then
            # Try to find the NDK bin directory under the SDK root
            NDK_TOOLCHAIN_DIR=$(find $ANDROID_SDK_ROOT/ndk -type d -name "linux-x86_64" | head -n 1)/bin
          else
            # Use the explicit NDK path
            NDK_TOOLCHAIN_DIR="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          fi

          echo "NDK Toolchain Directory: $NDK_TOOLCHAIN_DIR"
          
          if [ -d "$NDK_TOOLCHAIN_DIR" ]; then
            # Create Symlinks for the missing tools (ar and ranlib are most common)
            echo "Creating symlinks to resolve 'ranlib not found' error..."
            ln -sf "$NDK_TOOLCHAIN_DIR/llvm-ar" "$NDK_TOOLCHAIN_DIR/aarch64-linux-android-ar"
            ln -sf "$NDK_TOOLCHAIN_DIR/llvm-ranlib" "$NDK_TOOLCHAIN_DIR/aarch64-linux-android-ranlib"
          
            # Also add the toolchain dir to PATH to ensure they are discoverable
            echo "Adding toolchain to PATH."
            echo "$NDK_TOOLCHAIN_DIR" >> $GITHUB_PATH
          else
            echo "Error: NDK toolchain directory not found at the expected location."
            exit 1
          fi

      - name: Build + Release
        uses: tauri-apps/tauri-action@mobile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
          mobile: ${{ matrix.mobile }}
