# EXAMPLE USAGE:
#
#   Refer for explanation to following link:
#   https://lefthook.dev/configuration
pre-commit:
  parallel: true
  commands:
    lint:
      skip:
        - ref: master
      # don't block non master commits for lint errors
      run: pnpm run format {staged_files} || true
      stage_fixed: true
    lint-master:
      only:
        - ref: master
      # block master commits for lint errors
      run: pnpm run format {staged_files}
      stage_fixed: true
    sync-versions:
      only:
        - ref: master
      run: node scripts/syncVersions.js
      stage_fixed: true
